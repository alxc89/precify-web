<aside
  class="hidden h-screen w-64 flex-col space-y-2 border-r border-emerald-100/10 bg-[#f0fff7] p-4 font-sans text-sm font-medium lg:fixed lg:left-0 lg:top-0 lg:z-50 lg:flex"
>
  <div class="mb-6 flex items-center gap-3 px-2">
    <div
      class="flex h-10 w-10 items-center justify-center rounded-xl bg-[#004f38] text-white shadow-lg shadow-emerald-900/20"
    >
      <lucide-icon [img]="logoIcon" class="h-5 w-5" />
    </div>

    <div>
      <h1 class="text-2xl font-black leading-tight text-[#004f38]">Precify</h1>
      <p class="text-[10px] font-bold uppercase tracking-[0.24em] text-emerald-800/50">
        Digital Sommelier
      </p>
    </div>
  </div>

  <nav class="flex-1 space-y-1" aria-label="Menu principal">
    @for (item of navigationItems; track item.label) {
      @if (item.path) {
        <a
          #linkActive="routerLinkActive"
          [class]="linkClass(linkActive.isActive, item.enabled)"
          [routerLink]="item.path"
          [routerLinkActiveOptions]="{ exact: item.exact }"
          routerLinkActive
        >
          <lucide-icon [img]="item.icon" class="h-5 w-5" />
          <span>{{ item.label }}</span>
        </a>
      } @else {
        <button
          [class]="linkClass(false, item.enabled)"
          [disabled]="!item.enabled"
          type="button"
        >
          <lucide-icon [img]="item.icon" class="h-5 w-5" />
          <span>{{ item.label }}</span>
        </button>
      }
    }
  </nav>

  <div class="border-t border-emerald-100/20 pt-4">
    <button
      class="flex w-full items-center gap-3 rounded-xl px-4 py-3 text-emerald-800/70 transition-all hover:bg-emerald-100"
      type="button"
    >
      <lucide-icon [img]="supportIcon" class="h-5 w-5" />
      <span>Suporte</span>
    </button>
  </div>
</aside>
