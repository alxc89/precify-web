<div class="min-h-full">
  <app-ingredients-page-header
    title="Gestao de Insumos"
    (createIngredient)="onCreateIngredient()"
  />

  <div class="mb-8 grid grid-cols-12 gap-6">
    <app-ingredients-filters
      [categories]="vm().categories"
      [selectedCategoryId]="vm().selectedCategoryId"
      [statusFilter]="vm().statusFilter"
      (categoryChange)="facade.setCategory($event)"
      (statusChange)="facade.setStatusFilter($event)"
    />

    <app-inventory-stats-card [vm]="vm().inventoryStats" />
  </div>

  <app-ingredients-table
    [emptyMessage]="vm().emptyMessage"
    [error]="vm().error"
    [loading]="vm().loading"
    [pagination]="vm().pagination"
    [rows]="vm().rows"
    (deleteIngredient)="onDeleteIngredient($event)"
    (editIngredient)="onEditIngredient($event)"
    (pageChange)="facade.setPage($event)"
  />

  @if (isManagementModalOpen()) {
    <app-ingredient-management-modal
      [categories]="editableCategories()"
      [error]="managementError()"
      [ingredient]="managementDetail()"
      [loading]="managementLoading()"
      [mode]="managementMode()!"
      [saving]="managementSaving()"
      (close)="closeManagementModal()"
      (deactivateIngredient)="onDeactivateIngredient()"
      (deactivatePrice)="onDeactivatePrice($event)"
      (editPrice)="onEditPrice($event)"
      (openNewPrice)="openNewPriceModal()"
      (saveIngredient)="onSaveIngredient($event)"
    />
  }

  @if (isPriceModalOpen()) {
    <app-ingredient-price-modal
      [baseUnit]="priceModalBaseUnit()"
      [error]="priceError()"
      [hasStoreContext]="hasStoreContext()"
      [ingredientName]="priceModalIngredientName()"
      [mode]="priceModalMode()!"
      [price]="selectedPriceEntry()"
      [saving]="priceSaving()"
      (close)="closePriceModal()"
      (savePrice)="onSavePrice($event)"
    />
  }
</div>
