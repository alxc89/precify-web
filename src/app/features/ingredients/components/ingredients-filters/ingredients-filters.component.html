<section
  aria-labelledby="ingredients-filters-title"
  class="flex min-h-[8rem] flex-wrap items-center gap-3 rounded-xl bg-white px-6 py-7 shadow-sm"
>
  <h2
    id="ingredients-filters-title"
    class="mr-2 text-xs font-bold uppercase tracking-[0.2em] text-emerald-800/40"
  >
    Filtrar por:
  </h2>

  @for (category of categories(); track category.id) {
    <button
      [attr.aria-pressed]="selectedCategoryId() === category.id"
      [class]="categoryClass(category.id)"
      type="button"
      (click)="categoryChange.emit(category.id)"
    >
      {{ category.label }}
    </button>
  }

  <div class="ml-auto flex items-center gap-2">
    <label class="text-sm text-[#3f4943]" for="ingredient-status-filter">Status:</label>
    <div class="relative">
      <select
        [value]="statusFilter()"
        class="ingredients-filters__status-select rounded-lg border-none bg-[#e7fff2] text-sm font-semibold text-[#004f38] focus:outline-none focus:ring-1 focus:ring-[#004f38]"
        id="ingredient-status-filter"
        (change)="onStatusChange($event)"
      >
        <option value="active">Ativos</option>
        <option value="inactive">Inativos</option>
      </select>

      <lucide-icon
        [img]="ChevronDown"
        class="pointer-events-none absolute right-3 top-1/2 h-4 w-4 -translate-y-1/2 text-emerald-800/50"
      />
    </div>
  </div>
</section>
