<section
  class="relative min-h-[8rem] overflow-hidden rounded-xl bg-[#17694d] p-5 text-[#99e6c2] shadow-sm"
>
  <div class="relative z-10">
    <p class="mb-0.5 text-[0.6875rem] font-bold uppercase opacity-70">{{ vm().title }}</p>
    <p class="font-['Manrope'] text-[1.75rem] font-black leading-none text-white">
      {{ vm().valueLabel }}
    </p>

    <div
      class="mt-3 inline-flex items-center gap-1.5 rounded bg-white/10 px-2 py-1 text-[0.6875rem] font-bold text-white"
    >
      <lucide-icon [img]="TrendingUp" class="h-3 w-3" />
      <span>{{ vm().trendLabel }}</span>
    </div>
  </div>

  <lucide-icon
    [img]="DollarSign"
    class="absolute bottom-2 right-2 h-20 w-20 text-white/10"
  />
</section>
