<div class="flex flex-col gap-4 border-t border-[#bec9c1]/20 px-8 py-4 lg:flex-row lg:items-center lg:justify-between">
  <p class="text-sm text-[#3f4943]">
    Mostrando {{ pagination().startItem }}-{{ pagination().endItem }} de
    {{ pagination().totalItems }} insumos
  </p>

  <div class="flex items-center gap-2">
    <button
      [disabled]="!canGoBack()"
      aria-label="Pagina anterior"
      class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-[#bec9c1]/30 bg-white text-[#3f4943] transition-colors hover:bg-[#c9f8e2] focus:outline-none focus:ring-2 focus:ring-[#004f38] disabled:cursor-not-allowed disabled:opacity-40"
      type="button"
      (click)="pageChange.emit(pagination().currentPage - 1)"
    >
      <lucide-icon [img]="ChevronLeft" class="h-4 w-4" />
    </button>

    @for (page of pagination().pageNumbers; track page) {
      <button
        [class]="pageButtonClass(page)"
        [attr.aria-current]="pagination().currentPage === page ? 'page' : null"
        type="button"
        (click)="pageChange.emit(page)"
      >
        {{ page }}
      </button>
    }

    <button
      [disabled]="!canGoForward()"
      aria-label="Proxima pagina"
      class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-[#bec9c1]/30 bg-white text-[#3f4943] transition-colors hover:bg-[#c9f8e2] focus:outline-none focus:ring-2 focus:ring-[#004f38] disabled:cursor-not-allowed disabled:opacity-40"
      type="button"
      (click)="pageChange.emit(pagination().currentPage + 1)"
    >
      <lucide-icon [img]="ChevronRight" class="h-4 w-4" />
    </button>
  </div>
</div>
