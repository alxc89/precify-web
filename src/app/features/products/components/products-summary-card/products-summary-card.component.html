<aside
  aria-label="Resumo do catálogo"
  class="relative h-full min-h-[8rem] overflow-hidden rounded-xl bg-[#17694d] px-6 py-5 text-white shadow-sm"
>
  <div class="relative z-10">
    <p class="text-[0.6875rem] font-bold uppercase tracking-[0.18em] text-[#99e6c2]/70">
      Resumo do Catálogo
    </p>

    <div class="mt-4 grid grid-cols-3 gap-3">
      <div class="rounded-xl bg-white/10 px-3 py-3">
        <p class="text-[0.625rem] font-bold uppercase tracking-[0.16em] text-white/65">Total</p>
        <p class="mt-1 font-['Manrope'] text-2xl font-black leading-none">{{ totalProducts() }}</p>
      </div>

      <div class="rounded-xl bg-white/10 px-3 py-3">
        <p class="text-[0.625rem] font-bold uppercase tracking-[0.16em] text-[#a5f2ce]/80">
          Ativos
        </p>
        <p class="mt-1 font-['Manrope'] text-2xl font-black leading-none text-[#a5f2ce]">
          {{ activeProducts() }}
        </p>
      </div>

      <div class="rounded-xl bg-white/10 px-3 py-3">
        <p class="text-[0.625rem] font-bold uppercase tracking-[0.16em] text-[#ffdbca]/80">
          Inativos
        </p>
        <p class="mt-1 font-['Manrope'] text-2xl font-black leading-none text-[#ffdbca]">
          {{ inactiveProducts() }}
        </p>
      </div>
    </div>
  </div>

  <div class="pointer-events-none absolute -right-6 -top-6 h-24 w-24 rounded-full bg-white/5"></div>
  <div class="pointer-events-none absolute -bottom-10 right-6 h-20 w-20 rounded-full bg-white/5"></div>
</aside>
