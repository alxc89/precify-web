<div class="flex items-center gap-2">
  <button
    [disabled]="currentPage() === 1"
    aria-label="Página anterior"
    class="flex h-10 w-10 items-center justify-center rounded-xl border border-emerald-100 bg-white text-emerald-900 transition-colors hover:bg-emerald-50 disabled:cursor-not-allowed disabled:opacity-30"
    type="button"
    (click)="goToPage(currentPage() - 1)"
  >
    <lucide-icon [img]="ChevronLeft" class="h-4 w-4" />
  </button>

  @for (page of pages(); track page) {
    <button [class]="pageClass(page)" type="button" (click)="goToPage(page)">
      {{ page }}
    </button>
  }

  <button
    [disabled]="currentPage() === totalPages()"
    aria-label="Próxima página"
    class="flex h-10 w-10 items-center justify-center rounded-xl border border-emerald-100 bg-white text-emerald-900 transition-colors hover:bg-emerald-50 disabled:cursor-not-allowed disabled:opacity-30"
    type="button"
    (click)="goToPage(currentPage() + 1)"
  >
    <lucide-icon [img]="ChevronRight" class="h-4 w-4" />
  </button>
</div>
