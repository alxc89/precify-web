<div class="min-h-full">
  <app-products-page-header title="Catálogo de Produtos" (createProduct)="onCreateProduct()" />

  <div class="mb-6 grid grid-cols-12 gap-6">
    <div class="col-span-12 xl:col-span-8">
      <app-products-filters
        [categories]="vm().categories"
        [selectedCategory]="vm().selectedCategory"
        [selectedStatus]="vm().selectedStatus"
        [statusOptions]="vm().statusOptions"
        (categoryChange)="onCategoryChange($event)"
        (statusChange)="onStatusChange($event)"
      />
    </div>

    <div class="col-span-12 xl:col-span-4">
      <app-products-summary-card
        [activeProducts]="vm().activeProducts"
        [inactiveProducts]="vm().inactiveProducts"
        [totalProducts]="vm().totalProducts"
      />
    </div>
  </div>

  <app-products-grid
    [currentPage]="vm().currentPage"
    [error]="vm().error"
    [items]="vm().items"
    [loading]="vm().loading"
    [totalItems]="vm().filteredProducts"
    [totalPages]="vm().totalPages"
    [visibleItems]="vm().visibleProducts"
    (deleteProduct)="onDeleteProduct($event)"
    (editProduct)="onEditProduct($event)"
    (pageChange)="onPageChange($event)"
  />

  @if (isManagementModalOpen()) {
    <app-product-management-modal
      [error]="managementError()"
      [ingredientOptions]="ingredientOptions()"
      [loading]="managementLoading()"
      [mode]="managementMode()!"
      [product]="managementProduct()"
      [saving]="managementSaving()"
      (close)="closeManagementModal()"
      (saveProduct)="onSaveProduct($event)"
      (toggleProductStatus)="onToggleProductStatus()"
    />
  }
</div>
